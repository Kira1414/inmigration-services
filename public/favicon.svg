<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="rotate(-15, 250, 250)" filter="url(#shadow)">
    <rect x="130" y="100" width="240" height="320" rx="30" fill="url(#blueGrad)" />
    
    <g stroke="white" stroke-width="8" fill="none" opacity="0.9">
      <circle cx="250" cy="230" r="65" />
      <ellipse cx="250" cy="230" rx="25" ry="65" />
      <line x1="185" y1="230" x2="315" y2="230" />
      <path d="M200 185 Q250 200 300 185" />
      <path d="M200 275 Q250 260 300 275" />
    </g>
  </g>

  <path d="M100 350 C 100 450, 350 480, 420 330" 
        stroke="url(#tealGrad)" stroke-width="45" stroke-linecap="round" fill="none" 
        filter="url(#shadow)"/>

  <g transform="translate(390, 260) rotate(10)" filter="url(#shadow)">
    <path d="M0 0 C -30 -30, -30 -70, 0 -70 C 30 -70, 30 -30, 0 0 Z" fill="url(#tealGrad)" />
    <circle cx="0" cy="-45" r="12" fill="#115E59" />
  </g>
</svg>
