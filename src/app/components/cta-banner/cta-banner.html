<section class="relative overflow-hidden bg-primary py-20">
  <div class="absolute inset-x-0 top-0 h-2 bg-[linear-gradient(90deg,#b31942_0_30%,#ffffff_30%_36%,#071b46_36%_70%,#ffffff_70%_76%,#b31942_76%_100%)]"></div>
  <div class="pointer-events-none absolute right-0 top-0 h-full w-1/2 opacity-10">
    <img alt="Arquitectura institucional en Estados Unidos" class="h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOAC3mRv7COZW1SFqFfFjfPEf9I4WLq1kt1CalLCPDwXZkkJCCZpzGgg61CInfBClAzarRLLv1Y_lKzu8esxpppmEPALqDvMBAtDnmTsvy_dVK-xSAZDoXGNS8wkdpHaSYUrT08pLhmYAFm1pdONFv2FM-CmoCLFBkJG_a3C2A_EA69Z4GFSvaLWIbuKQaENT5cOfy2XzLuYrSfmwTNDlan1hKmkWFVSnpSuyPaBdH9YRzERqtN_DdYYMxDhpX874sJlk2aTH7xMys">
  </div>
  <div class="relative z-10 mx-auto flex max-w-7xl flex-col items-center justify-between gap-12 px-6 text-center lg:flex-row lg:text-left">
    <div>
      <h2 class="mb-4 font-headline text-4xl font-bold text-white md:text-5xl">{{ title() }}</h2>
      <p class="max-w-xl text-xl text-slate-300">{{ description() }}</p>
      <p class="mt-4 max-w-xl text-sm text-slate-400">Nuestro servicio se centra en la estrategia migratoria, formularios, evidencia y preparacion del caso de visado.</p>
    </div>
    <div class="flex flex-col gap-6 sm:flex-row">
      <div class="rounded-xl border border-white/10 bg-surface-container-lowest/10 p-6 backdrop-blur-md">
        <p class="mb-1 font-label text-sm uppercase text-slate-400">{{ phoneLabel() }}</p>
        <p class="text-2xl font-bold text-white">{{ phoneNumber() }}</p>
      </div>
      <a class="rounded-xl bg-secondary-container px-10 py-6 text-xl font-black text-on-secondary-container shadow-2xl transition-transform hover:-translate-y-1" href="#contacto">
        {{ buttonLabel() }}
      </a>
    </div>
  </div>
</section>
